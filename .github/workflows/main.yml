name: Vu UniVerse360 CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Install Backend Dependencies
      run: |
        cd backend-nest
        npm install

    - name: Build Backend
      run: |
        cd backend-nest
        npm run build --if-present

    - name: Build Frontend
      run: |
        npm run build --if-present
      env:
        CI: false
        REACT_APP_API_URL: http://localhost:5001

    - name: Start Services (Integration Check)
      run: |
        # This is a smoke test to ensure things start
        nohup node run-all.js &
        sleep 20
        curl -f http://localhost:5001/api/students/overview/demo || true
